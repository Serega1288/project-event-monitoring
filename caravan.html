<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Захист Каравану 3D</title>
    <link rel="stylesheet" href="caravan.css">
  </head>
  <body>
    <main id="gameRoot">
      <canvas id="gameCanvas" aria-label="3D гра Захист Каравану"></canvas>

      <section class="hud" aria-label="Показники гри">
        <div class="title">Захист Каравану</div>
        <div class="stats">
          <span>Караван <strong id="caravanHp">100</strong></span>
          <span>Гравець <strong id="playerHp">100</strong></span>
          <span>Монстри <strong id="kills">0</strong></span>
          <span>Хвиля <strong id="wave">1</strong></span>
        </div>
      </section>

      <section class="help">
        <span>WASD - рух</span>
        <span>Миша - напрям</span>
        <span>ЛКМ / Space - удар</span>
        <span>R - рестарт</span>
      </section>

      <section class="overlay" id="overlay">
        <h1>Захисти караван</h1>
        <p>Монстри біжать до воза. Рухайся, бий їх і тримай караван живим.</p>
        <button id="startBtn" type="button">Почати</button>
      </section>
    </main>

    <script type="module" src="caravan.js"></script>
  </body>
</html>
